        const ib=document.getElementById('info-box');
        let drag=false, offX=0, offY=0;

        document.addEventListener('mousemove', (e) => { if(drag){ ib.style.left=(e.clientX+offX)+'px'; ib.style.top=(e.clientY+offY)+'px'; ib.style.right='auto'; } });
        document.addEventListener('mouseup', () => { drag=false; });
