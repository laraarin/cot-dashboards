<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFTC COT — Terminal</title>
<script>(function(){try{var t=localStorage.getItem("sm-theme");if(t==="light")document.documentElement.dataset.theme="light";}catch(e){}})();</script>
<style>
  :root{
    --ground:#0E1318; --surface:#161D26; --surface-2:#1B232E;
    --text:#E8E2D5; --muted:#8B93A0; --faint:#5A626E;
    --accent:#E9A53C; --accent-2:#6FA2CE;
    --line:rgba(233,165,60,.14); --line-cool:rgba(111,162,206,.16);
    --good:#7FB069; --bad:#D2654E;
    --mono:ui-monospace,"Cascadia Code","Cascadia Mono","Consolas","SFMono-Regular",monospace;
    --sans:"Segoe UI",system-ui,-apple-system,sans-serif;
    --oi:var(--accent-2); --oc:var(--accent);
    --on-accent:#0E1318;
    --sb:264px; --hd:64px;
  }
  :root[data-theme="light"]{
    --ground:#fdf6e3; --surface:#f4edd8; --surface-2:#efe7cf;
    --text:#574f3a; --muted:#8a7d5e; --faint:#a99b78;
    --accent:#b3890b; --accent-2:#268bd2;
    --line:rgba(179,137,11,.30); --line-cool:rgba(38,139,210,.22);
    --good:#6f8b00; --bad:#cb4b16;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--sans);color:var(--text);background:var(--ground);
    background-image:
      radial-gradient(50% 40% at 12% 0%, rgba(111,162,206,.07), transparent 60%),
      radial-gradient(50% 40% at 92% 0%, rgba(233,165,60,.07), transparent 60%);
    background-attachment:fixed;overflow:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
  :root[data-theme="light"] body{
    background-image:
      radial-gradient(50% 40% at 12% 0%, rgba(38,139,210,.05), transparent 60%),
      radial-gradient(50% 40% at 92% 0%, rgba(179,137,11,.07), transparent 60%);}

  /* header */
  header{position:fixed;top:0;left:0;right:0;height:var(--hd);z-index:1000;
    display:flex;align-items:center;gap:14px;padding:0 18px;
    background:var(--surface);border-bottom:1px solid var(--line);}
  .ham{display:none;flex-direction:column;gap:5px;cursor:pointer;}
  .ham div{width:22px;height:2.5px;background:var(--text);border-radius:2px;transition:.3s;}
  .logo{font-weight:900;font-size:18px;letter-spacing:1.5px;color:var(--text);}
  .logo span{color:var(--accent);}
  .now-asset{display:flex;align-items:center;gap:9px;margin-left:6px;font-weight:700;font-size:15px;color:var(--text);}
  .now-asset .ico{font-size:18px;}
  .toggle{display:flex;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:3px;margin-left:4px;}
  .toggle button{border:none;background:none;color:var(--muted);font-family:inherit;font-weight:700;font-size:12px;
    padding:6px 15px;border-radius:8px;cursor:pointer;transition:.2s;letter-spacing:.5px;}
  .toggle button.on.oi{color:var(--accent-2);background:color-mix(in srgb,var(--accent-2) 16%,transparent);}
  .toggle button.on.oc{color:var(--accent);background:color-mix(in srgb,var(--accent) 16%,transparent);}
  .spacer{margin-left:auto;}
  .iconbtn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;
    cursor:pointer;font-size:16px;line-height:1;background:var(--surface-2);border:1px solid var(--line);color:var(--text);transition:.18s;}
  .iconbtn:hover{border-color:var(--accent);}
  .home{color:var(--muted);text-decoration:none;font-size:12px;font-weight:600;padding:8px 12px;border-radius:9px;border:1px solid var(--line);transition:.18s;}
  .home:hover{color:var(--text);background:var(--surface-2);}
  .status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.5px;}
  .live{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 0 4px color-mix(in srgb,var(--good) 22%,transparent);}
  .date{font-family:var(--mono);font-size:12px;color:var(--muted);}

  /* sidebar */
  #sidebar{position:fixed;top:var(--hd);left:0;width:var(--sb);bottom:0;z-index:900;
    background:var(--surface);border-right:1px solid var(--line);
    padding:16px 12px;overflow-y:auto;transition:transform .35s cubic-bezier(.19,1,.22,1);}
  .sb-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 14px 6px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;cursor:pointer;
    color:var(--muted);font-weight:600;font-size:14px;transition:.18s;border:1px solid transparent;}
  .nav-item .ico{font-size:17px;width:22px;text-align:center;}
  .nav-item:hover{background:var(--surface-2);color:var(--text);}
  .nav-item.active{background:color-mix(in srgb,var(--accent-2) 14%,transparent);color:var(--text);border-color:var(--line-cool);}
  .sb-note{margin:14px 8px 4px;padding:12px 14px;border-radius:11px;background:var(--surface-2);
    border:1px solid var(--line);color:var(--muted);font-size:11.5px;line-height:1.6;}
  .sb-note b.oi{color:var(--oi);} .sb-note b.oc{color:var(--oc);}

  /* content */
  #content{position:fixed;top:var(--hd);left:var(--sb);right:0;bottom:0;padding:16px;}
  .frame-wrap{width:100%;height:100%;border-radius:16px;overflow:hidden;border:1px solid var(--line);
    box-shadow:0 18px 50px -28px rgba(0,0,0,.7);background:#fff;}
  iframe{width:100%;height:100%;border:none;display:block;background:#fff;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:880;display:none;}
  .overlay.open{display:block;}

  @media(max-width:880px){
    .ham{display:flex;}
    #sidebar{transform:translateX(-100%);box-shadow:24px 0 60px rgba(0,0,0,.4);}
    #sidebar.open{transform:translateX(0);}
    #content{left:0;}
    .now-asset .lbl-txt{display:none;}
    .home{display:none;}
  }
</style>
</head>
<body>
<header>
  <div class="ham" id="ham" onclick="toggleMenu()"><div></div><div></div><div></div></div>
  <div class="logo">CFTC<span> COT</span></div>
  <div class="now-asset"><span class="ico" id="cur-ico">🥇</span><span class="lbl-txt" id="cur-name">Gold</span></div>
  <div class="toggle">
    <button class="on oi" id="t-oi" onclick="setMode('OI')">OI</button>
    <button id="t-oc" onclick="setMode('OC')">OC</button>
  </div>
  <div class="spacer"></div>
  <button class="iconbtn" id="themeBtn" title="Açık / koyu tema">🌙</button>
  <a class="home" href="index.html">← Ana ekran</a>
  <div class="status"><span class="live"></span> LIVE</div>
  <div class="date" id="date">—</div>
</header>

<div id="sidebar">
  <div class="sb-label">Varlıklar</div>
  <div id="nav"></div>
  <div class="sb-label" style="margin-top:12px;">Makro / Temel Veri</div>
  <div id="nav-macro"></div>
  <div class="sb-note"><b class="oi">OI</b> = Futures Only · <b class="oc">OC</b> = Options + Futures. Üstteki anahtarla geçiş yap. <b>Makro</b> panelleri OI/OC'den bağımsızdır.</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div id="content">
  <div class="frame-wrap"><iframe id="frame" src="OI/Gold.html"></iframe></div>
</div>

<script>
  const assets=[
    {name:"Gold",file:"Gold.html",ico:"🥇"},
    {name:"Silver",file:"Silver.html",ico:"🥈"},
    {name:"Platinum",file:"Platinum.html",ico:"💿"},
    {name:"Palladium",file:"Palladium.html",ico:"⚪"},
    {name:"Copper",file:"Copper.html",ico:"🥉"},
    {name:"Bitcoin",file:"Bitcoin.html",ico:"₿"},
    {name:"Crude Oil (WTI)",file:"CrudeOil.html",ico:"🛢️"},
    {name:"Euro FX",file:"Euro.html",ico:"🇪🇺"},
    {name:"Wheat",file:"Wheat.html",ico:"🌾"},
    {name:"Corn",file:"Corn.html",ico:"🌽"},
    {name:"Soybeans",file:"Soybeans.html",ico:"🫘"},
  ];
  const macro=[
    {name:"EUR — Faiz Farkı (2Y)",file:"Fundamentals/Euro_RateSpread.html",ico:"📈"},
  ];
  let mode="OI", curFile="Gold.html";

  document.getElementById("nav").innerHTML = assets.map((a,i)=>
    `<div class="nav-item${i===0?' active':''}" onclick="loadAsset(${i},this)">
       <span class="ico">${a.ico}</span>${a.name}</div>`).join("");

  document.getElementById("nav-macro").innerHTML = macro.map((m,i)=>
    `<div class="nav-item" onclick="loadFixed(${i},this)">
       <span class="ico">${m.ico}</span>${m.name}</div>`).join("");

  function loadAsset(i,el){
    const a=assets[i]; curFile=a.file;
    document.getElementById("frame").src = mode+"/"+a.file;
    document.getElementById("cur-name").textContent=a.name;
    document.getElementById("cur-ico").textContent=a.ico;
    setActive(el);
    if(window.innerWidth<=880) closeMenu();
  }
  function loadFixed(i,el){
    const m=macro[i];
    document.getElementById("frame").src = m.file;
    document.getElementById("cur-name").textContent=m.name;
    document.getElementById("cur-ico").textContent=m.ico;
    setActive(el);
    if(window.innerWidth<=880) closeMenu();
  }
  function setMode(m){
    mode=m;
    document.getElementById("t-oi").className = (m==="OI"?"on oi":"");
    document.getElementById("t-oc").className = (m==="OC"?"on oc":"");
    document.getElementById("frame").src = mode+"/"+curFile;
  }
  function setActive(el){
    document.querySelectorAll(".nav-item").forEach(i=>i.classList.remove("active"));
    el.classList.add("active");
  }
  function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("open");
  }
  function closeMenu(){
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("overlay").classList.remove("open");
  }

  // --- Prizma teması: aç/koyu toggle (sm-theme paylaşımlı) ---
  function currentTheme(){return document.documentElement.dataset.theme==="light"?"light":"dark";}
  function syncThemeBtn(){const b=document.getElementById("themeBtn");if(b)b.textContent=currentTheme()==="light"?"☀":"🌙";}
  function toggleTheme(){
    const t=currentTheme()==="light"?"dark":"light";
    if(t==="light")document.documentElement.dataset.theme="light";
    else document.documentElement.removeAttribute("data-theme");
    try{localStorage.setItem("sm-theme",t);}catch(e){}
    syncThemeBtn();
  }
  document.getElementById("themeBtn").onclick=toggleTheme;
  syncThemeBtn();

  try{ document.getElementById("date").textContent = new Date().toISOString().slice(0,10); }catch(e){}
</script>
</body>
</html>
