<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFTC COT — Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070a12; --tx:#e8edf6; --mut:#8b96a8;
    --oi:#3b82f6; --oc:#a855f7; --grn:#22c55e;
    --glass:rgba(255,255,255,.05); --glass-bd:rgba(255,255,255,.09);
    --sb:264px; --hd:64px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Inter',sans-serif;color:var(--tx);background:var(--bg);
    background-image:
      radial-gradient(50% 40% at 12% 0%, rgba(59,130,246,.14), transparent 60%),
      radial-gradient(50% 40% at 92% 0%, rgba(168,85,247,.13), transparent 60%);
    background-attachment:fixed;overflow:hidden;-webkit-font-smoothing:antialiased;}

  /* header */
  header{position:fixed;top:0;left:0;right:0;height:var(--hd);z-index:1000;
    display:flex;align-items:center;gap:14px;padding:0 20px;
    background:rgba(10,14,22,.6);backdrop-filter:blur(18px);border-bottom:1px solid var(--glass-bd);}
  .ham{display:none;flex-direction:column;gap:5px;cursor:pointer;}
  .ham div{width:22px;height:2.5px;background:#fff;border-radius:2px;transition:.3s;}
  .logo{font-weight:900;font-size:18px;letter-spacing:1.5px;}
  .logo span{background:linear-gradient(100deg,#60a5fa,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .now-asset{display:flex;align-items:center;gap:9px;margin-left:6px;font-weight:700;font-size:15px;}
  .now-asset .ico{font-size:18px;}
  .toggle{display:flex;background:rgba(0,0,0,.3);border:1px solid var(--glass-bd);border-radius:11px;padding:3px;margin-left:4px;}
  .toggle button{border:none;background:none;color:var(--mut);font-family:inherit;font-weight:700;font-size:12px;
    padding:6px 15px;border-radius:8px;cursor:pointer;transition:.2s;letter-spacing:.5px;}
  .toggle button.on.oi{color:#fff;background:linear-gradient(100deg,#3b82f6,#60a5fa);box-shadow:0 4px 14px -4px rgba(59,130,246,.7);}
  .toggle button.on.oc{color:#fff;background:linear-gradient(100deg,#8b5cf6,#a855f7);box-shadow:0 4px 14px -4px rgba(168,85,247,.7);}
  .spacer{margin-left:auto;}
  .home{color:var(--mut);text-decoration:none;font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;border:1px solid var(--glass-bd);transition:.18s;}
  .home:hover{color:#fff;background:rgba(255,255,255,.05);}
  .status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut);font-weight:700;letter-spacing:.5px;}
  .live{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 0 4px rgba(34,197,94,.18);}
  .date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mut);}

  /* sidebar */
  #sidebar{position:fixed;top:var(--hd);left:0;width:var(--sb);bottom:0;z-index:900;
    background:rgba(13,18,28,.72);backdrop-filter:blur(18px);border-right:1px solid var(--glass-bd);
    padding:16px 12px;overflow-y:auto;transition:transform .35s cubic-bezier(.19,1,.22,1);}
  .sb-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mut);padding:8px 14px 6px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;cursor:pointer;
    color:var(--mut);font-weight:600;font-size:14px;transition:.18s;border:1px solid transparent;}
  .nav-item .ico{font-size:17px;width:22px;text-align:center;}
  .nav-item:hover{background:rgba(255,255,255,.04);color:var(--tx);}
  .nav-item.active{background:rgba(59,130,246,.12);color:#fff;border-color:rgba(59,130,246,.28);}
  .sb-note{margin:14px 8px 4px;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.03);
    border:1px solid var(--glass-bd);color:var(--mut);font-size:11.5px;line-height:1.6;}

  /* content */
  #content{position:fixed;top:var(--hd);left:var(--sb);right:0;bottom:0;padding:16px;}
  .frame-wrap{width:100%;height:100%;border-radius:18px;overflow:hidden;border:1px solid var(--glass-bd);
    box-shadow:0 20px 60px -24px rgba(0,0,0,.85);background:#fff;}
  iframe{width:100%;height:100%;border:none;display:block;background:#fff;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);z-index:880;display:none;}
  .overlay.open{display:block;}

  @media(max-width:880px){
    .ham{display:flex;}
    #sidebar{transform:translateX(-100%);box-shadow:24px 0 60px rgba(0,0,0,.6);}
    #sidebar.open{transform:translateX(0);}
    #content{left:0;}
    .now-asset .lbl-txt{display:none;}
    .home{display:none;}
  }
</style>
</head>
<body>
<header>
  <div class="ham" id="ham" onclick="toggleMenu()"><div></div><div></div><div></div></div>
  <div class="logo">CFTC<span> COT</span></div>
  <div class="now-asset"><span class="ico" id="cur-ico">🥇</span><span class="lbl-txt" id="cur-name">Gold</span></div>
  <div class="toggle">
    <button class="on oi" id="t-oi" onclick="setMode('OI')">OI</button>
    <button id="t-oc" onclick="setMode('OC')">OC</button>
  </div>
  <div class="spacer"></div>
  <a class="home" href="index.html">← Ana ekran</a>
  <div class="status"><span class="live"></span> LIVE</div>
  <div class="date" id="date">—</div>
</header>

<div id="sidebar">
  <div class="sb-label">Varlıklar</div>
  <div id="nav"></div>
  <div class="sb-note"><b style="color:#cfe0ff">OI</b> = Futures Only · <b style="color:#ecd6ff">OC</b> = Options + Futures. Üstteki anahtarla geçiş yap.</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div id="content">
  <div class="frame-wrap"><iframe id="frame" src="OI/Gold.html"></iframe></div>
</div>

<script>
  const assets=[
    {name:"Gold",file:"Gold.html",ico:"🥇"},
    {name:"Silver",file:"Silver.html",ico:"🥈"},
    {name:"Platinum",file:"Platinum.html",ico:"💿"},
    {name:"Palladium",file:"Palladium.html",ico:"⚪"},
    {name:"Copper",file:"Copper.html",ico:"🥉"},
    {name:"Bitcoin",file:"Bitcoin.html",ico:"₿"},
    {name:"Crude Oil (WTI)",file:"CrudeOil.html",ico:"🛢️"},
    {name:"Euro FX",file:"Euro.html",ico:"🇪🇺"},
    {name:"Wheat",file:"Wheat.html",ico:"🌾"},
    {name:"Corn",file:"Corn.html",ico:"🌽"},
    {name:"Soybeans",file:"Soybeans.html",ico:"🫘"},
  ];
  let mode="OI", curFile="Gold.html";

  document.getElementById("nav").innerHTML = assets.map((a,i)=>
    `<div class="nav-item${i===0?' active':''}" onclick="loadAsset(${i},this)">
       <span class="ico">${a.ico}</span>${a.name}</div>`).join("");

  function loadAsset(i,el){
    const a=assets[i]; curFile=a.file;
    document.getElementById("frame").src = mode+"/"+a.file;
    document.getElementById("cur-name").textContent=a.name;
    document.getElementById("cur-ico").textContent=a.ico;
    setActive(el);
    if(window.innerWidth<=880) closeMenu();
  }
  function setMode(m){
    mode=m;
    document.getElementById("t-oi").className = (m==="OI"?"on oi":"");
    document.getElementById("t-oc").className = (m==="OC"?"on oc":"");
    document.getElementById("frame").src = mode+"/"+curFile;
  }
  function setActive(el){
    document.querySelectorAll(".nav-item").forEach(i=>i.classList.remove("active"));
    el.classList.add("active");
  }
  function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("open");
  }
  function closeMenu(){
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("overlay").classList.remove("open");
  }
  try{ document.getElementById("date").textContent = new Date().toISOString().slice(0,10); }catch(e){}
</script>
</body>
</html>
