  const T=SPEC.dates.map(d=>Date.parse(d));
  function ms(d){return (typeof d==='string')?Date.parse(d):(d instanceof Date?d.getTime():Date.parse(String(d)));}
  function nidx(t){let lo=0,hi=T.length-1; if(t<=T[0])return 0; if(t>=T[hi])return hi;
    while(lo<=hi){const m=(lo+hi)>>1; if(T[m]<t)lo=m+1; else hi=m-1;}
    return (Math.abs(T[lo]-t)<Math.abs(T[lo-1]-t))?lo:lo-1;}
  function mp(xs,src){return xs.map(d=>src[nidx(ms(d))]);}
  let ORIG=null;
  function cap(gd){
    const f=n=>gd.data.findIndex(t=>t.name===n);
    const si=f('Sentiment'),supi=f('Support'),resi=f('Resistance'),zi=f('Inst. Z-Score');
    ORIG={si,supi,resi,zi,
      base:(gd.data[si].base||[]).slice(), y:(gd.data[si].y||[]).slice(),
      color:(gd.data[si].marker.color||[]).slice(),
      supY:(gd.data[supi].y||[]).slice(), resY:(gd.data[resi].y||[]).slice(),
      instY:(gd.data[zi].y||[]).slice()};
  }

      if(supi>=0)Plotly.restyle(gd,{'y':[mp(gd.data[supi].x,SPEC.buy)]},[supi]);
      if(resi>=0)Plotly.restyle(gd,{'y':[mp(gd.data[resi].x,SPEC.sell)]},[resi]);
      if(zi>=0)Plotly.restyle(gd,{'y':[mp(gd.data[zi].x,SPEC.z)],'name':'Spek\u00fclat\u00f6r Z'},[zi]);

      if(si>=0)Plotly.restyle(gd,{'base':[ORIG.base],'y':[ORIG.y],'marker.color':[ORIG.color]},[si]);

      if(resi>=0)Plotly.restyle(gd,{'y':[ORIG.resY]},[resi]);
      if(zi>=0)Plotly.restyle(gd,{'y':[ORIG.instY],'name':'Inst. Z-Score'},[zi]);

      :'Ticari (Smart Money) kontraryan zone — long->destek';
