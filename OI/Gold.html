  const T=SPEC.dates.map(d=>Date.parse(d));
  function ms(d){return (typeof d==='string')?Date.parse(d):(d instanceof Date?d.getTime():Date.parse(String(d)));}
  function nidx(t){let lo=0,hi=T.length-1; if(t<=T[0])return 0; if(t>=T[hi])return hi;
    while(lo<=hi){const m=(lo+hi)>>1; if(T[m]<t)lo=m+1; else hi=m-1;}
    return (Math.abs(T[lo]-t)<Math.abs(T[lo-1]-t))?lo:lo-1;}
  function mp(xs,src){return xs.map(d=>src[nidx(ms(d))]);}
  let ORIG=null;
  // Plotly verisi binary (bdata/dtype) olabilir -> cozulmus diziler _fullData'da
  function plain(v){return (v==null)?[]:Array.prototype.slice.call(v);}
  function cap(gd){
    const fd=gd._fullData||gd.data;
    const f=n=>gd.data.findIndex(t=>t.name===n);
    const si=f('Sentiment'),supi=f('Support'),resi=f('Resistance'),zi=f('Inst. Z-Score');
    ORIG={si,supi,resi,zi,
      base:plain(fd[si].base), y:plain(fd[si].y),
      color:plain(fd[si].marker&&fd[si].marker.color),
      supY:supi>=0?plain(fd[supi].y):[], resY:resi>=0?plain(fd[resi].y):[],
      instY:zi>=0?plain(fd[zi].y):[]};
  }
  window.setPos=function(which){
   try{
    const gd=document.getElementById('main-plot');
    if(!gd||!gd.data||!window.Plotly){return false;}
    if(!ORIG)cap(gd);
    const {si,supi,resi,zi}=ORIG;
    if(which==='spec'){
      const bx=gd.data[si].x;
      const sb=mp(bx,SPEC.buy), ss=mp(bx,SPEC.sell);
      const h=sb.map((b,i)=>ss[i]-b), col=mp(bx,SPEC.z);  // ham net z: + yesil / - kirmizi
      if(si>=0)Plotly.restyle(gd,{'base':[sb],'y':[h],'marker.color':[col]},[si]);
      if(supi>=0)Plotly.restyle(gd,{'y':[mp(gd.data[supi].x,SPEC.buy)]},[supi]);
      if(resi>=0)Plotly.restyle(gd,{'y':[mp(gd.data[resi].x,SPEC.sell)]},[resi]);
      if(zi>=0)Plotly.restyle(gd,{'y':[mp(gd.data[zi].x,SPEC.z)],'name':'Spek\u00fclat\u00f6r Z'},[zi]);
    }else{
      if(si>=0)Plotly.restyle(gd,{'base':[ORIG.base],'y':[ORIG.y],'marker.color':[ORIG.color]},[si]);
      if(supi>=0)Plotly.restyle(gd,{'y':[ORIG.supY]},[supi]);
      if(resi>=0)Plotly.restyle(gd,{'y':[ORIG.resY]},[resi]);
      if(zi>=0)Plotly.restyle(gd,{'y':[ORIG.instY],'name':'Inst. Z-Score'},[zi]);
    }
    const bs=document.getElementById('bt-smart'),bp=document.getElementById('bt-spec');
    if(bs)bs.className='smart'+(which==='comm'?' on':'');
    if(bp)bp.className='spec'+(which==='spec'?' on':'');
    return true;
   }catch(e){return false;}
  };
  // iframe icindeysek (master.html) dashboard butonunu gizle -> master'inki kullanilir
  try{ if(window.top!==window.self){var pt=document.getElementById('pos-toggle'); if(pt)pt.style.display='none';} }
  catch(e){ var pt2=document.getElementById('pos-toggle'); if(pt2)pt2.style.display='none'; }
})();
