    <script>
        const ib=document.getElementById('info-box');
        let drag=false, offX=0, offY=0;
        ib.addEventListener('mousedown', (e) => {
            drag = true;
            offX = ib.offsetLeft - e.clientX;
            offY = ib.offsetTop - e.clientY;
        });
        document.addEventListener('mousemove', (e) => {
            if (drag) {
                ib.style.left = (e.clientX + offX) + 'px';
                ib.style.top = (e.clientY + offY) + 'px';
                ib.style.right = 'auto';
            }
        });
        document.addEventListener('mouseup', () => { drag = false; });
    </script></body></html>
